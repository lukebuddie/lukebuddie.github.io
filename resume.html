<main class="main">

<script>
    // ── Theme ──
    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.querySelector('.theme-toggle').textContent = isDark ? '☽' : '☀';
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    const saved = localStorage.getItem('theme');
    if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        document.querySelector('.theme-toggle').textContent = saved === 'dark' ? '☀' : '☽';
    }
    function toggleMenu() {
        document.getElementById('mobile-nav').classList.toggle('open');
    }

    // ── Typewriter reveal ──
    function typeText(el, text, speed, callback) {
        let i = 0;
        el.textContent = '';
        const interval = setInterval(() => {
            el.textContent += text[i];
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                if (callback) setTimeout(callback, 400);
            }
        }, speed);
    }

    window.addEventListener('load', () => {
        const greeting  = document.getElementById('greeting-text');
        const headline  = document.getElementById('headline-text');
        const twEl      = document.getElementById('typewriter-text');
        const actions   = document.getElementById('resume-actions');
        const note      = document.getElementById('resume-note');

        // Step 1 — greeting fades in
        setTimeout(() => {
            typeText(greeting, 'Oh, hi again.', 60, () => {

                // Step 2 — headline appears
                setTimeout(() => {
                    headline.style.visibility = 'visible';
                    headline.style.opacity = '0';
                    headline.style.transition = 'opacity 0.5s';
                    requestAnimationFrame(() => {
                        headline.style.opacity = '1';
                    });

                    // Step 3 — typewriter line
                    setTimeout(() => {
                        typeText(twEl, "Fine, fine — here's my resume.", 45, () => {
                            // remove cursor
                            twEl.style.setProperty('--cursor', 'none');
                            twEl.id = 'typewriter-done';

                            // Step 4 — buttons + note appear
                            setTimeout(() => {
                                actions.classList.add('show');
                                note.classList.add('show');
                            }, 300);
                        });
                    }, 600);

                }, 300);
            });
        }, 350);
    });
</script>

<style>
    /* Remove blinking cursor once typing is done */
    #typewriter-done::after { display: none; }
    #typewriter-text { font-size: 1rem; color: var(--muted); font-weight: 300; }
</style>
</body>
